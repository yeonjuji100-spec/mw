<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BELLE SCHOOL - Pure Aesthetics</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="custom-cursor"></div>
    <div class="sun"></div>

    <nav class="nav-overlay">
        <a href="#about">About</a>
        <a href="#departments">Dept</a>
        <a href="#portfolio">Work</a>
        <a href="#companies">Biz</a>
        <a href="#life">Life</a>
    </nav>

    <main class="container">
        <!-- Hero Stone -->
        <section id="hero" class="stone">
            <h1 class="stone-text">BELLE</h1>
        </section>

        <!-- About Stone -->
        <section id="about" class="stone">
            <h2 class="stone-text">ABOUT</h2>
        </section>

        <!-- Dept Stone -->
        <section id="departments" class="stone">
            <h2 class="stone-text">DEPT</h2>
        </section>

        <!-- Work Stone -->
        <section id="portfolio" class="stone">
            <h2 class="stone-text">WORK</h2>
        </section>

        <!-- Portfolio Items -->
        <div class="stone">
            <h3 class="stone-text">PRJ 01</h3>
        </div>
        <div class="stone">
            <h3 class="stone-text">PRJ 02</h3>
        </div>

        <!-- Biz Stone -->
        <section id="companies" class="stone">
            <h2 class="stone-text">BIZ</h2>
        </section>

        <!-- Life Stone -->
        <section id="life" class="stone">
            <h2 class="stone-text">LIFE</h2>
        </section>
        
        <div style="height: 40vh;"></div> <!-- Bottom Spacer -->
    </main>

    <script src="main.js"></script>
</body>
</html>
