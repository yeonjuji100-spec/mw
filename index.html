<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BELLE SCHOOL - Pure Aesthetics</title>
    <link rel="stylesheet" href="style.css?v=1.1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="custom-cursor"></div>
    <div class="sun"></div>

    <header class="main-header">
        <h1 class="main-title">
            <svg class="cloud-icon" viewBox="0 0 100 80" xmlns="http://www.w3.org/2000/svg">
                <!-- Outer circles for translucent effect -->
                <circle cx="30" cy="55" r="22" fill="#4DB2FF" fill-opacity="0.7" />
                <circle cx="50" cy="40" r="28" fill="#4DB2FF" fill-opacity="0.8" />
                <circle cx="75" cy="55" r="22" fill="#4DB2FF" fill-opacity="0.7" />
                <rect x="30" y="55" width="45" height="22" fill="#4DB2FF" />
            </svg>AniCloud
        </h1>
        <p class="main-subtitle">Find Your Next Anime Above the Clouds</p>
    </header>

    <main class="container">
        <section id="hero" class="stone">
            <div class="stone-content">
                <h2 class="stone-text">판타지 · 액션</h2>
            </div>
        </section>

        <!-- About Stone -->
        <section id="about" class="stone">
            <div class="stone-content">
                <h2 class="stone-text">코미디 · 일상</h2>
            </div>
        </section>

        <!-- Dept Stone -->
        <section id="departments" class="stone">
            <div class="stone-content">
                <h2 class="stone-text">DEPT</h2>
            </div>
        </section>

        <!-- Work Stone -->
        <section id="portfolio" class="stone">
            <div class="stone-content">
                <h2 class="stone-text">WORK</h2>
            </div>
        </section>

        <!-- Portfolio Items -->
        <div class="stone">
            <div class="stone-content">
                <h3 class="stone-text">PRJ 01</h3>
            </div>
        </div>
        <div class="stone">
            <div class="stone-content">
                <h3 class="stone-text">PRJ 02</h3>
            </div>
        </div>

        <!-- Biz Stone -->
        <section id="companies" class="stone">
            <div class="stone-content">
                <h2 class="stone-text">BIZ</h2>
            </div>
        </section>

        <!-- Life Stone -->
        <section id="life" class="stone">
            <div class="stone-content">
                <h2 class="stone-text">LIFE</h2>
            </div>
        </section>
        
        <div style="height: 40vh;"></div> <!-- Bottom Spacer -->
    </main>

    <!-- Gallery Overlay -->
    <div id="gallery-overlay">
        <button class="gallery-btn" id="page-info">1 / 3</button>
        <button class="gallery-btn" id="back-btn">BACK</button>
        
        <div class="gallery-content-wrapper" id="gallery-content-wrapper">
            <div class="gallery-left-col">
                <div class="gallery-image-container">
                    <img id="gallery-img" src="work1.png" alt="Gallery Image">
                </div>
            </div>
            <div class="gallery-right-col" id="gallery-info-sidebar">
                <div class="sidebar-badge-container">
                    <span class="recommend-badge" id="sidebar-badge">추천작</span>
                </div>
                <h2 id="sidebar-title">작품 제목</h2>
                
                <div class="sidebar-meta-row">
                    <span id="sidebar-genre-medium">장르 | TVA</span>
                    <span class="meta-age" id="sidebar-age-badge">15</span>
                    <span class="sidebar-avg-rating">
                        <span class="star-icon">★</span> 
                        <span id="sidebar-rating-val">4.8</span>
                    </span>
                </div>

                <div class="sidebar-interactive-row">
                    <div class="rating-stars-container">
                        <span class="stars-label">내 별점</span>
                        <div class="stars-input" id="sidebar-stars">
                            <span class="star" data-value="1">★</span>
                            <span class="star" data-value="2">★</span>
                            <span class="star" data-value="3">★</span>
                            <span class="star" data-value="4">★</span>
                            <span class="star" data-value="5">★</span>
                        </div>
                    </div>
                    <button class="favorite-btn" id="sidebar-fav-btn">
                        <span class="heart-icon">♡</span> 찜하기
                    </button>
                </div>

                <div class="sidebar-synopsis-container">
                    <span id="sidebar-synopsis">줄거리 미리보기...</span>
                    <button id="more-btn">더 보기</button>
                </div>
                
                <div id="sidebar-tags" class="info-tags"></div>
            </div>
        </div>

        <button class="gallery-btn" id="prev-btn">PREV</button>
        <button class="gallery-btn" id="next-btn">NEXT</button>
    </div>

    <!-- Info Overlay -->
    <div id="info-overlay">
        <div class="info-card">
            <button id="info-close-btn">&times;</button>
            <div class="sidebar-badge-container" style="text-align: center; margin-bottom: 5px;">
                <span class="recommend-badge" id="info-badge">추천작</span>
            </div>
            <h2 class="info-title" id="info-title">작품 정보</h2>
            
            <div class="sidebar-meta-row" style="justify-content: center; margin-bottom: 25px;">
                <span id="info-genre-medium">장르 | TVA</span>
                <span class="meta-age" id="info-age-badge">15</span>
                <span class="sidebar-avg-rating" style="margin-left: 15px;">
                    <span class="star-icon">★</span> 
                    <span id="info-rating-val">4.8</span>
                </span>
            </div>

            <div class="info-body">
                <div class="info-section">
                    <h3 class="info-section-title">줄거리</h3>
                    <p class="info-text" id="info-synopsis"></p>
                </div>
                <div class="info-section">
                    <h3 class="info-section-title">태그</h3>
                    <div class="info-tags" id="info-tags-container"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
